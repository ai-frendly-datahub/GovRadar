# === MCP 서버 소스 (공공데이터) ===
# NOTE: data-go-mcp-servers는 워크스페이스 구조, 개별 패키지 사용
- name: 국민연금 사업장 MCP
  type: mcp
  url: https://github.com/Koomook/data-go-mcp-servers
  config:
    transport: stdio
    command: uvx
    args: ["data-go-mcp.nps-business-enrollment@latest"]
    env:
      API_KEY: "${DATA_GO_KR_API_KEY}"
    tool: search_business
    arguments:
      wkplNm: ""
    transform:
      title_field: wkplNm
      link_field: null
      summary_fields: ["bzowrRgstNo", "adptDt"]
      published_field: adptDt
